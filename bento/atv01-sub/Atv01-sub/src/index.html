<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <title>Atividade</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="card">
            <img src="../icons/x.png">

            <h2>TWITTER</h2>

            <p>
                Veja notícias rápidas, opiniões e assuntos do momento.
            </p>

            <button onclick="twitter()">
                ACESSAR
            </button>
        </div>


        <div class="card">
            <img src="../icons/instagram.icon.png">

            <h2>INSTAGRAM</h2>

            <p>
                Compartilhe fotos, vídeos e momentos com seus amigos.
            </p>

            <button onclick="instagram()">
                ACESSAR
            </button>
        </div>


        <div class="card">
            <img src="../icons/youtube.png">

            <h2>YOUTUBE</h2>

            <p>
                Assista vídeos, músicas, lives e conteúdos variados.
            </p>

            <button onclick="youtube()">
                ACESSAR
            </button>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
